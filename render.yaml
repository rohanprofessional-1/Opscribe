services:
  - type: web
    name: opscribe-core-api
    runtime: docker
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opscribe-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false # Set this manually in UI later (Vercel URL)
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
        
databases:
  - name: opscribe-db
    databaseName: opscribe
    user: opscribeusr
    ipAllowList: [] # Blank means public internet is blocked, but internal Render services can access it
