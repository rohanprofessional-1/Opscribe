
upstream opscribe_web {
    server 127.0.0.1:5173;
    server 127.0.0.1:5174;
}

upstream opscribe_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://opscribe_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # API: forward anonymous client cookie as X-Client-ID so backend can scope requests
    location /api/ {
        proxy_pass http://opscribe_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass the anonymous client UUID from cookie to backend (same name as API expects)
        proxy_set_header X-Client-ID $cookie_anonymous_client_id;
    }
}
